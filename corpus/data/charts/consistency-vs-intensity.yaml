caption_en: "Both plans started enthusiastically. The first contributed RM43,200 in steady drips and compounded into RM96,000. The second contributed RM3,000 in a brief sprint, then stopped — even with 17.5 years of compounding, it ends at RM12,000. Time, not intensity, is what compounding rewards. Pick a number you can sustain on an average month, not your best one."
caption_ms: "Kedua-dua pelan dimulakan dengan semangat. Yang pertama menyumbang RM43,200 dalam titisan tetap dan berkompaun menjadi RM96,000. Yang kedua menyumbang RM3,000 dalam pecutan singkat, kemudian berhenti — walaupun dengan 17.5 tahun berkompaun, ia berakhir pada RM12,000. Masa, bukan kesungguhan, yang dihargai oleh kompaun. Pilih jumlah yang anda boleh kekalkan pada bulan purata, bukan bulan terbaik anda."
source_citation: "Both scenarios at 8% annual return, monthly compounding. Scenario A: RM200/month for 216 months. Scenario B: RM500/month for 6 months (~RM3,050 by month 6), then no further contributions, compounded for the remaining 210 months. Anchored to the tactical-setup rule in corpus/courses/compounding-dca.md. Illustrative — actual fund returns vary; Public Mutual fund-specific projections must come from each fund's Master Prospectus and Product Highlights Sheet (PHS)."
