caption_en: "Today's RM50,000 degree becomes RM120,000 in 18 years at 5% education inflation. The same RM50,000 in a savings account at 2% interest grows to only RM71,000 — a RM49,000 shortfall. The gap is what equity-tilt unit trusts are designed to close."
