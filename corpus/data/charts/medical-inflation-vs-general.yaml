caption_en: "An illustrative RM10,000 of medical treatment today becomes about RM96,500 in 20 years if it compounds at ~12%/yr — while the same RM10,000 grows to only about RM14,900 at 2%/yr general inflation. That is the gap a family plan has to cover. The 12%/yr here is a chosen illustrative rate, not an official statistic: it sits within the ~9-15% range Malaysia has recorded (2023 ~12.6%; 2024 actual was higher, at 15% — Bank Negara Malaysia), and Malaysian medical inflation has run roughly 6-8x general CPI. The RM10,000 is an illustrative unit, not a specific bill. Illustrative model output only — not personalised advice, not guaranteed or assured; actual costs and inflation vary."
caption_ms: "Rawatan perubatan ilustrasi bernilai RM10,000 hari ini menjadi kira-kira RM96,500 dalam 20 tahun jika ia berganda pada ~12%/tahun — sementara RM10,000 yang sama hanya menjadi kira-kira RM14,900 pada inflasi am 2%/tahun. Itulah jurang yang perlu ditampung oleh pelan keluarga. Kadar 12%/tahun di sini ialah kadar ilustrasi yang dipilih, bukan statistik rasmi: ia berada dalam julat ~9-15% yang Malaysia telah rekodkan (2023 ~12.6%; angka sebenar 2024 lebih tinggi, pada 15% — Bank Negara Malaysia), dan inflasi perubatan Malaysia telah berjalan kira-kira 6-8x inflasi am (CPI). RM10,000 ialah unit ilustrasi, bukan bil khusus. Keluaran model ilustrasi sahaja — bukan nasihat peribadi, tidak dijamin; kos dan inflasi sebenar berbeza-beza."
source_citation: "Rate series (published): medical-cost inflation from Bank Negara Malaysia (2024 actual = 15%; 2023 ~12.6%; 2013-2018 avg ~9-10%), Aon Global Medical Trend Rates Report (2025 Malaysia projected ~12.6%; global ~10%, APAC ~11%), and Mercer Marsh Benefits Health Trends 2026 (APAC 2026 projected ~14%); general-inflation comparator from DOSM Consumer Price Index (~1.8% 2024, ~2% recent). The compounding lines are a derived illustration, NOT published or measured figures: a chosen illustrative ~12%/yr (sitting within Malaysia's recorded ~9-15% range, below the 2024 BNM actual of 15%) applied to an illustrative RM10,000 unit vs 2%/yr general inflation over 20 years — not a sourced specific bill. Illustrative only — not personalised advice, not guaranteed or assured; actual costs, inflation, and timelines vary."
