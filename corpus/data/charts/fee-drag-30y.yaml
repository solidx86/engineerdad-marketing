callout_en: "2.0% vs 0.5%: ~3× more lost to fees"
callout_ms: "2.0% vs 0.5%: ~3× lebih hilang kepada yuran"
caption_en: "Same RM300/month, same 6% gross return — only the annual fee changes. Over 30 years a 2% fee removes ~RM93,000 versus ~RM27,000 at 0.5%. A fee that sounds small is a large, silent withdrawal once it compounds."
caption_ms: "RM300/sebulan yang sama, pulangan kasar 6% yang sama — hanya yuran tahunan berubah. Selama 30 tahun yuran 2% mengambil ~RM93,000 berbanding ~RM27,000 pada 0.5%. Yuran yang kedengaran kecil ialah pengeluaran besar yang senyap apabila ia berkompaun."
source_citation: "Illustrative compound-cost math only — RM300/month contributed monthly over 30 years at 6% gross annual return; each value is the future value of the annuity at the gross rate minus the same annuity at the net-of-fee rate, rounded. Not a specific fund. Public Mutual fund fees and projections must come from each fund's Master Prospectus and Product Highlights Sheet (PHS)."
