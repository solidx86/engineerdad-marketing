caption_en: "A fixed RM200/month buys more units when the price is low, so every crash drags your average cost down. After 20 years your average cost sits far below the market price — the units are worth more than they cost you. That gap is the whole point of dollar-cost averaging."
caption_ms: "RM200/sebulan yang tetap membeli lebih banyak unit apabila harga rendah, jadi setiap kejatuhan menarik turun kos purata anda. Selepas 20 tahun, kos purata anda jauh di bawah harga pasaran — unit bernilai lebih daripada kos anda. Jurang itulah inti purata kos dolar."
source_citation: "Illustrative market path only — not a specific fund and not a forecast. A fixed RM200/month over 21 years on a stylised volatile-but-rising index; the average-cost line is total invested ÷ cumulative units. Actual fund returns vary year to year and can be negative. Public Mutual fund-specific projections must come from each fund's Master Prospectus and Product Highlights Sheet (PHS)."
