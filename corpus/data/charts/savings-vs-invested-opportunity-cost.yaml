caption_en: "A 2% savings account grows RM100,000 to about RM143,000 over 18 years — it roughly keeps pace with general inflation, so you are not really 'losing' money. The real cost is what you give up: the same RM100,000 invested at an illustrative long-run balanced return of ~6% a year could grow to about RM285,000. That gap — roughly RM142,000 — is the opportunity cost of playing it safe, not a loss on the savings account. Important balance: this 6% is an illustrative assumption, not a promised or projected return. Investing carries market risk — its value can fall as well as rise, and you could get back less than you put in — a risk a savings account does not have. Illustrative figures do not predict future results."
caption_ms: "Akaun simpanan 2% membesarkan RM100,000 kepada kira-kira RM143,000 dalam 18 tahun — ia secara kasar seiring dengan inflasi am, jadi anda tidak benar-benar 'rugi' wang. Kos sebenar ialah apa yang anda lepaskan: RM100,000 yang sama, dilaburkan pada pulangan berimbang jangka panjang ilustrasi ~6% setahun, boleh membesar kepada kira-kira RM285,000. Jurang itu — kira-kira RM142,000 — ialah kos peluang bermain selamat, bukan kerugian pada akaun simpanan. Imbangan penting: 6% ini ialah andaian ilustrasi, bukan pulangan yang dijanji atau diunjur. Pelaburan membawa risiko pasaran — nilainya boleh turun dan juga naik, dan anda mungkin menerima kembali kurang daripada yang dilaburkan — risiko yang tiada pada akaun simpanan. Angka ilustrasi tidak meramal keputusan masa depan."
source_citation: "Illustrative compounding scenario. Invested series: RM100,000 x (1.06)^t, where 6% is an ILLUSTRATIVE long-run balanced-portfolio return assumption — not a forecast, promise, or guarantee, and not tied to any specific fund. Savings series: RM100,000 x (1.02)^t, where 2% is a conservative deposit-rate assumption. Both series are nominal (not inflation-adjusted) and rounded to the nearest RM1,000. Figures are illustrative only; actual returns and deposit rates vary year to year. Investing carries market risk that a savings account does not; past or illustrative returns do not predict future results."
