# Annual management fee — two robo-advisors vs a Public Mutual equity unit trust.
# The honest point: "robo" is not one number. StashAway (0.8% p.a. on the first
# RM150k, and no sales charge) is genuinely cheaper than an equity UT; Versa Invest
# (1.50% p.a. AHAM fund fee) is about the SAME as a UT. So the fee point is conceded
# where it's true and corrected where it isn't — then the chart pivots to the
# structural difference the fee bars don't show: the PRS tax-relief wrapper and EPF
# i-Invest access a robo Invest account doesn't carry.
# Source: corpus/data/datasets/robo-fee-tiers.json (StashAway pricing page + Versa Invest fee
# schedule, fetched 2026-06-15; Public Mutual AMF + PRS relief from owned
# a-fee-schedule.md + b-relief-stacking.md).
# Used by media-production when scene argues "robo-advisors do it cheaper",
# "StashAway/Versa is the same thing", "just use a robo-advisor"
# (objection myths d2-robo-is-cheaper, d2-robo-same-as-ut).

