caption_en: "KWSP's Retirement Income Adequacy schedule says what you should have saved at each age to land at the three age-60 targets. By 40 the Adequate line is already ~RM149,000; by 50, ~RM339,000. The honest question isn't whether EPF invests for you — it does — it's whether your EPF projection actually meets the Adequate line. For most members it doesn't, and the gap is what PRS and unit-trust accumulation are meant to close. Targets are KWSP guidelines in today's ringgit; a longer horizon means the real number is higher after inflation."
caption_ms: "Jadual Kecukupan Pendapatan Persaraan KWSP menyatakan berapa anda patut simpan pada setiap umur untuk mencapai tiga sasaran usia-60. Menjelang 40, garisan Mencukupi sudah ~RM149,000; menjelang 50, ~RM339,000. Soalan sebenarnya bukan sama ada EPF melabur untuk anda — ya — tetapi sama ada unjuran EPF anda benar-benar mencapai garisan Mencukupi. Bagi kebanyakan ahli ia tidak, dan jurang itulah yang PRS dan pengumpulan amanah saham bertujuan untuk menutup. Sasaran ialah garis panduan KWSP dalam ringgit nilai hari ini; ufuk lebih panjang bermakna jumlah sebenar lebih tinggi selepas inflasi."
source_citation: "KWSP 'New Basic, Adequate and Enhanced Savings Levels' (Table 1), kwsp.gov.my — EPF Releases Belanjawanku 2024/2025 and Retirement Income Adequacy Framework; extracted 2026-06-07 into corpus/data/datasets/kwsp-ria-benchmarks.json. Age-60 anchors: Basic RM390,000, Adequate RM650,000, Enhanced RM1,300,000. Chart plots 5-year age marks from the full age 18-60 schedule. KWSP guideline targets in present-day ringgit, not a guarantee; a future retirement horizon must be inflation-adjusted upward. Personal target depends on lifestyle, dependents, horizon, and healthcare assumptions — a licensed Consultant can model the personalised number."
