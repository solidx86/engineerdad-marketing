caption_en: "Started at birth, RM200/month at an 8% assumed return projects to roughly RM96,000 by age 18 — close to the RM100,000+ a local degree is expected to cost. RM100/month gets you halfway there; RM300/month gives a buffer for tuition inflation overshoot or an overseas top-up. The variable that moves the result most is not the amount — it's the start date."
caption_ms: "Bermula dari kelahiran, RM200/sebulan pada andaian pulangan 8% menganggar kira-kira RM96,000 pada usia 18 — hampir dengan RM100,000+ yang dijangka kos ijazah tempatan. RM100/sebulan membawa anda separuh jalan; RM300/sebulan memberi penampan untuk inflasi yuran berlebihan atau tambahan luar negara. Pemboleh ubah yang paling banyak menggerakkan keputusan bukan jumlah — ia tarikh mula."
source_citation: "Calculated using future value of a monthly annuity at 8% annual return, monthly compounding, 216 months (18 years), no initial lump-sum deposit. Anchored to the FAQ in corpus/courses/children-fund-101.md ('RM200–300 per month from birth at 7–8% return') and the canonical worked example in corpus/courses/compounding-dca.md. Illustrative only — actual fund returns vary. Public Mutual fund-specific projections must come from each fund's Master Prospectus and Product Highlights Sheet (PHS)."
