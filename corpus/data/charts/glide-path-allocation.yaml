# Glide-path allocation — how an 18-year children's-fund portfolio shifts from growth to protection
# Source: corpus/courses/children-fund-101.md Module 2.4 + FAQ ("Equity-heavy for long horizons,
# shift toward lower-volatility funds — bonds and money-market — in the final 3–5 years before
# withdrawal"); corpus/courses/compounding-dca.md tactical-setup rule ("In the final 3–5 years
# before withdrawal, glide toward lower-volatility funds").
# Used by media-production when scene argues "the final 3–5 years matter most", "glide path",
# "don't expose 18 years of compounding to a year-17 crash", or "what does an annual review
# actually look at".

id: glide-path-allocation
