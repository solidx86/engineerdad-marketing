caption_en: "RM390,000 buys you Basic survival in retirement. RM650,000 is the realistic Adequate tier — and the level most Malaysians don't hit on EPF alone. RM1,300,000 is Enhanced. The gap between where your EPF projection lands and the Adequate line is what PRS, unit-trust accumulation, and any voluntary top-up are designed to close. Note: these are KWSP targets in today's ringgit — a present-day floor. If you retire in, say, 20 years, inflation pushes the real number you'll need higher, which only widens the gap."
caption_ms: "RM390,000 membeli Asas — sekadar bertahan dalam persaraan. RM650,000 ialah tahap Mencukupi yang realistik — dan tahap yang kebanyakan rakyat Malaysia tidak capai melalui EPF sahaja. RM1,300,000 ialah Ditingkatkan. Jurang antara unjuran EPF anda dan garisan Mencukupi ialah apa yang PRS, pengumpulan amanah saham, dan apa-apa tambahan sukarela direka untuk menutup. Nota: ini ialah sasaran KWSP dalam ringgit nilai hari ini — paras minimum semasa. Jika anda bersara dalam, katakan, 20 tahun, inflasi menolak jumlah sebenar yang anda perlukan lebih tinggi, yang hanya melebarkan jurang itu."
source_citation: "Tier figures from KWSP Belanjawanku, as cited in corpus/courses/prs-basics.md and reflected in the EPF Sustainability Calculator (engineerdad.my/tools/epf-sustainability-calculator). Tiers are KWSP's published guideline targets, not a guarantee, and are stated in present-day ringgit — a future retirement horizon must be inflation-adjusted upward. Personal target depends on lifestyle, dependents, time horizon, and post-retirement healthcare assumptions — a licensed Consultant can model the personalised, inflation-adjusted number."
