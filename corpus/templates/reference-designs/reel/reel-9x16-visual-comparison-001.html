<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:        #1B2B6B;
    --navy-dark:   #111c45;
    --orange:      #F07621;
    --teal:        #00B4A6;
    --teal-light:  #e6f8f7;
    --offwhite:    #F7F8FC;
    --warm-white:  #FEFEFE;
    --text:        #1a1a2e;
    --muted:       #6b7280;
    --border:      #e5e7f0;
    --font-head: 'Playfair Display', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    margin: 0;
    overflow: hidden;
    position: relative;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--teal-light);
  }
  .stage {
    position: absolute;
    top: 290px;
    left: 80px;
    right: 140px;
    bottom: 400px;
    display: flex;
    flex-direction: column;
  }
  .kicker {
    font-family: var(--font-body);
    font-size: 40px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal);
    margin: 0 0 18px 0;
  }
  .headline {
    font-family: var(--font-head);
    font-size: 88px;
    font-weight: 900;
    line-height: 1.06;
    color: var(--navy);
    margin: 0 0 64px 0;
  }
  .cols {
    display: flex;
    align-items: stretch;
    gap: 28px;
    flex: 1;
  }
  .col {
    flex: 1;
    background: var(--warm-white);
    border-radius: 28px;
    padding: 44px 36px;
    display: flex;
    flex-direction: column;
    border: 2px solid var(--border);
  }
  .col.lead {
    border: 3px solid var(--teal);
    box-shadow: 0 18px 50px rgba(0,180,166,0.22);
  }
  .col .tag {
    font-family: var(--font-body);
    font-size: 34px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .col.lead .tag { color: var(--teal); }
  .col .who {
    font-family: var(--font-head);
    font-size: 58px;
    font-weight: 700;
    line-height: 1.05;
    color: var(--navy);
    margin-bottom: 28px;
  }
  /* qualitative bar metaphor — widening gap, no numbers */
  .bar-track { margin-top: auto; display: flex; flex-direction: column; gap: 16px; }
  .bar {
    height: 40px;
    border-radius: 12px;
    background: var(--border);
  }
  .col.lead .bar { background: var(--teal); }
  .col.lag  .bar { background: rgba(27,43,107,0.30); }
  .bar.s1 { width: 30%; }
  .bar.s2 { width: 55%; }
  .bar.s3 { width: 85%; }
  .col.lag .bar.s1 { width: 24%; }
  .col.lag .bar.s2 { width: 34%; }
  .col.lag .bar.s3 { width: 44%; }
  .note {
    font-family: var(--font-body);
    font-size: 36px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--navy);
    margin: 56px 0 0 0;
    text-align: center;
  }
  .note .em { color: var(--orange); font-weight: 600; }
  .logo-mark {
    margin-top: 36px;
    align-self: flex-end;
    z-index: 100;
    pointer-events: none;
  }
  .logo-text {
    font-family: var(--font-head);
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .logo-text .engineer { color: var(--navy); }
  .logo-text .dad      { color: var(--orange); }
</style>
</head>
<body>
  <div class="stage">
    <p class="kicker">The Head Start</p>
    <h1 class="headline">Start early.<br>The gap only widens.</h1>
    <div class="cols">
      <div class="col lead">
        <div class="tag">Starts young</div>
        <div class="who">The Early Saver</div>
        <div class="bar-track">
          <div class="bar s1"></div>
          <div class="bar s2"></div>
          <div class="bar s3"></div>
        </div>
      </div>
      <div class="col lag">
        <div class="tag">Waits until later</div>
        <div class="who">The Late Starter</div>
        <div class="bar-track">
          <div class="bar s1"></div>
          <div class="bar s2"></div>
          <div class="bar s3"></div>
        </div>
      </div>
    </div>
    <p class="note">Same monthly habit. The difference is <span class="em">time in the market</span> — not luck.</p>
    <div class="logo-mark">
      <div class="logo-text"><span class="engineer">Engineer</span><span class="dad">Dad</span></div>
    </div>
  </div>
</body>
</html>
