# Target by budget — RM100/RM200/RM300 per month over 18 years at 8% return
# Source: FV of monthly annuity at r=8%/12, n=216 months, no initial deposit. Anchored
# to corpus/courses/children-fund-101.md FAQ "How much per month for university?"
# ("RM200–300 per month starting from birth, assuming 7–8% annual return" → ~RM100k)
# and the canonical worked example in corpus/courses/compounding-dca.md.
# Used by media-production when a scene argues "how much should I be saving per month",
# "is RM100 a month enough", any 5-Step Education Fund Playbook Step 1 hook
# (Define the goal in numbers), or "investing is for rich people / not for someone
# like me" (objection myth d0-investing-is-for-the-rich).

