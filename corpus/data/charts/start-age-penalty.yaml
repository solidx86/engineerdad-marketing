callout_en: "Age 0 vs Age 15: ~11× more"
callout_ms: "Usia 0 vs Usia 15: ~11× lebih"
caption_en: "Same RM200/month. Same 8% return assumption. The only thing that changes is when you start. Starting at birth produces roughly 2× the result of starting at age 5, and ~11× the result of starting at age 15. This is the Latency Penalty — every year of delay is one year of compounding lost forever."
caption_ms: "RM200/sebulan yang sama. Andaian pulangan 8% yang sama. Yang berubah hanyalah bila anda mula. Mula dari kelahiran menghasilkan kira-kira 2× keputusan mula pada usia 5, dan ~11× keputusan mula pada usia 15. Inilah Penalti Kelewatan — setiap tahun melengahkan ialah satu tahun berkompaun yang hilang selamanya."
source_citation: "Figures from corpus/courses/compounding-dca.md (canonical 'RM200/month at different start ages' table; 8% annual return, monthly compounding, no initial deposit). Illustrative only — actual fund returns vary year to year. Public Mutual fund-specific projections must come from each fund's Master Prospectus and Product Highlights Sheet (PHS)."
