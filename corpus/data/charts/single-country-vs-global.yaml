# Optional spotlight callout — rendered verbatim by the worker (never invented/recomputed).
# A framing line, not a figure — the convention allows either.
callout_en: "100% home = one point of failure"
callout_ms: "100% di rumah = satu titik kegagalan"
caption_en: "An all-MYR portfolio looks 'safe because it's home' — but it's a single point of failure. One currency, one economy, one cycle. The load-balanced shape spreads the same money across three regions whose risks aren't correlated. When one region drags, the others can carry. The diversification isn't decorative; it's how engineering systems survive."
caption_ms: "Portfolio MYR sepenuhnya kelihatan 'selamat kerana di rumah' — tetapi ia titik kegagalan tunggal. Satu mata wang, satu ekonomi, satu kitaran. Bentuk diseimbangkan menyebarkan wang yang sama merentas tiga rantau yang risikonya tidak berkorelasi. Apabila satu rantau menarik turun, yang lain boleh memikul. Kepelbagaian bukan hiasan; itulah cara sistem kejuruteraan bertahan."
source_citation: "Illustrative target allocations matching the brand's geographic-diversification framing in corpus/courses/children-fund-101.md and the Load Balancer metaphor in corpus/courses/content-recipes.md. Actual allocation depends on risk profile, fund availability, and licensed Consultant guidance. Not a recommendation."
