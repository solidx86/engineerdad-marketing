caption_en: "Medical-insurance PREMIUMS aren't fixed — they reprice. In the 2024-25 cycle Malaysian insurers sought one-step medical/IPMI premium increases of +40% to +70% (driven by ~19.6% claims inflation). Bank Negara Malaysia's Dec 2024 interim measures forbade that one-off jump: increases must be staggered over at least 3 years (through end-2026), and at least 80% of policyholders face no more than 10% a year. But even at the capped 10%/yr, a premium roughly doubles every ~7 years — an illustrative RM250/month becomes ~RM648 by year 10. Plan for the premium to keep climbing, not stay still. Illustrative only — not personalised advice, not a guaranteed or assured figure."
caption_ms: "PREMIUM insurans perubatan tidak tetap — ia dinilai semula. Dalam kitaran 2024-25, penanggung insurans Malaysia memohon kenaikan premium perubatan/IPMI sekali langkah sebanyak +40% hingga +70% (didorong inflasi tuntutan ~19.6%). Langkah interim Bank Negara Malaysia (Dis 2024) melarang lonjakan sekali itu: kenaikan mesti diperingkatkan sekurang-kurangnya 3 tahun (sehingga akhir 2026), dan sekurang-kurangnya 80% pemegang polisi menghadapi tidak lebih daripada 10% setahun. Namun walaupun pada had 10%/tahun, premium kira-kira berganda setiap ~7 tahun — ilustrasi RM250/bulan menjadi ~RM648 menjelang tahun ke-10. Rancang untuk premium terus menaik, bukan kekal sama. Ilustrasi sahaja — bukan nasihat peribadi, bukan angka yang dijamin atau dipastikan."
source_citation: "Bank Negara Malaysia — interim measures on medical & health insurance/takaful (IPMI) repricing, December 2024 (one-off pass-through forbidden; premium increases staggered over a minimum of 3 years through end-2026; at least 80% of policyholders capped at no more than 10% per year); and Nov 2024 industry reports that insurers sought one-step repricing of +40% to +70% driven by ~19.6% claims inflation. The +40-70% is documented market context only and is NOT plotted — BNM capped exactly that one-off jump. Illustrative RM250/month trajectory: a 10%/yr glide (RM250 x 1.10^t), reaching ~RM648/month by year 10; doubles in ~7.3 years. The RM250 base is illustrative, not a quoted premium; actual premiums and caps vary by insurer, plan, age and claims experience. This depicts insurance PREMIUM inflation, not medical-treatment-cost inflation. Illustrative only — not personalised advice, not a guaranteed or assured result."
