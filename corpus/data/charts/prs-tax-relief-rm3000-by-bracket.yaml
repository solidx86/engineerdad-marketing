caption_en: "PRS relief is a deduction, not a refund: contribute RM3,000/year (RM250/month) and you cut your taxable income by RM3,000 — so the cash you actually save is RM3,000 × your marginal tax rate. At the top brackets that's RM700+ (RM3,000 × 24% = RM720; RM750 at 25%); at the 19% bracket it's RM570. Illustrative by bracket only — not personalised tax advice. Your real saving depends on your own marginal rate, and the RM3,000 relief is scheduled through YA2030 — confirm the active Year of Assessment with LHDN before relying on it."
caption_ms: "Pelepasan PRS ialah potongan, bukan bayaran balik: sumbang RM3,000/tahun (RM250/bulan) dan anda mengurangkan pendapatan bercukai sebanyak RM3,000 — jadi wang sebenar yang anda jimat ialah RM3,000 × kadar cukai marginal anda. Pada kadar tertinggi ini bermakna RM700+ (RM3,000 × 24% = RM720; RM750 pada 25%); pada kadar 19% ia RM570. Ilustrasi mengikut kadar sahaja — bukan nasihat cukai peribadi. Penjimatan sebenar anda bergantung pada kadar marginal anda sendiri, dan pelepasan RM3,000 dijadualkan sehingga YA2030 — sahkan Tahun Taksiran aktif dengan LHDN sebelum bergantung padanya."
source_citation: "Saving derived as RM3,000 × the taxpayer's marginal income-tax rate, using the LHDN resident-individual rate schedule (YA2024: 19% / 24% / 24.5% / 25% bands). PRS personal income tax relief is up to RM3,000 per year and is scheduled through YA2030 — verify the active Year of Assessment with LHDN. Figures are illustrative by tax bracket, not personalised advice; your actual saving depends on your own marginal rate and chargeable income. Dataset: prs-tax-relief-rm3000-by-bracket."
