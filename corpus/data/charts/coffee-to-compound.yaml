caption_en: "The coffee isn't the problem. The 18 years of compounding it costs you is. RM240/month redirected becomes RM115,000 — more than a local degree. Add the eating-out reform and the same household quietly compounds itself to RM835,000 — within reach of the EPF Adequate retirement tier. Lifestyle bloat doesn't feel expensive month-to-month. That's exactly why it's expensive."
caption_ms: "Kopi bukan masalahnya. 18 tahun kompaun yang ia rampas dari anda — itulah masalahnya. RM240/sebulan dihalakan semula menjadi RM115,000 — lebih daripada kos ijazah tempatan. Tambah pembaharuan makan-luar dan rumah tangga yang sama secara senyap berkompaun sendiri kepada RM835,000 — dalam capaian tahap persaraan EPF Mencukupi. Lifestyle bloat tidak berasa mahal bulan demi bulan. Itulah sebabnya ia mahal."
source_citation: "Calculated using future value of a monthly annuity at 8% annual return, monthly compounding, 216 months (18 years), no initial deposit. Leak amounts sourced from corpus/courses/children-fund-101.md Module 3.1 (RM240/mo coffee, RM1,500/mo eating-out reduction). Rounded to nearest RM1,000. Illustrative — actual fund returns and household leaks vary."
