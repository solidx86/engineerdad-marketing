id: prs-tax-relief-rm3000-by-bracket
title_en: "What a RM3,000/year PRS contribution saves you in tax — by marginal bracket"
title_ms: "Penjimatan cukai daripada sumbangan PRS RM3,000/tahun — mengikut kadar marginal"
chart_type: bar
