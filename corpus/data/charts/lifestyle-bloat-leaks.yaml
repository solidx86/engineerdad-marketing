caption_en: "RM240 from the coffee habit. RM1,500 from one extra home-cooked dinner a week instead of eating out. That's RM1,740/month — not deprivation, just visibility. Most household budgets carry leaks this size, and most parents have never priced them. The audit is engineering work, not moralising."
caption_ms: "RM240 daripada tabiat kopi. RM1,500 daripada satu hidangan masakan rumah seminggu menggantikan makan luar. Itu RM1,740/sebulan — bukan kepayahan, hanya kejelasan. Kebanyakan bajet rumah tangga membawa kebocoran sebesar ini, dan kebanyakan ibu bapa tidak pernah menghargakannya. Audit ialah kerja kejuruteraan, bukan moralisasi."
source_citation: "Figures from the canonical Lifestyle Audit example in corpus/courses/children-fund-101.md Module 3.1. Coffee leak (RM15 × 4 runs/week) and eating-out reduction (RM2,500 → RM1,000) are illustrative household-level numbers, not population averages — the audit's job is to make YOUR specific leaks visible."
