caption_en: "For 15 years the portfolio is mostly equity — that's how compounding earns its keep. Then the final 3–5 years shift deliberately toward bonds and money-market, because 18 years of gain doesn't deserve to be exposed to a year-17 crash. The glide is the engineering: maximum growth while the runway is long, maximum protection just before withdrawal."
caption_ms: "Selama 15 tahun portfolio kebanyakannya ekuiti — itulah cara berkompaun memberi pulangannya. Kemudian 3–5 tahun terakhir beralih dengan sengaja kepada bon dan pasaran wang, kerana 18 tahun pertumbuhan tidak patut terdedah kepada kejatuhan pada tahun ke-17. Landasan luncur ialah kejuruteraannya: pertumbuhan maksimum semasa landasan masih panjang, perlindungan maksimum sebelum pengeluaran."
source_citation: "Illustrative glide-path shape derived from the brand's stated rule in corpus/courses/children-fund-101.md and corpus/courses/compounding-dca.md (equity-tilt for 15+ years; shift to bonds and money-market in the final 3–5 years). Actual allocation depends on the client's risk profile, fund availability, and licensed Consultant guidance. Not a recommendation."
