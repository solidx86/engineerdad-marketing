caption_en: "Same RM12,000. DCA bought 13,043 units (avg cost RM0.92/unit) by buying more units when prices dipped. Lump sum bought 12,000 units at the day-1 price. Difference comes from price volatility, not market direction."
caption_ms: "RM12,000 yang sama. DCA membeli 13,043 unit (kos purata RM0.92/unit) dengan membeli lebih banyak unit semasa harga turun. Sekaligus membeli 12,000 unit pada harga hari pertama. Perbezaan datang dari turun-naik harga, bukan arah pasaran."
source_citation: "Illustrative simulation — assumes a 12-month price path that dips in months 4–8. Real market outcomes vary. DCA's mathematical advantage holds when prices fluctuate; if prices rise monotonically, lump sum wins (rare scenario)."
