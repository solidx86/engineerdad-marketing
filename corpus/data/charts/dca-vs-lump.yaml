# DCA vs Lump Sum — same RM amount, different timing
# Illustrative 12-month sim showing how DCA achieves a lower average cost per unit
# when prices fluctuate. Numbers chosen to make the mechanic visible, not to predict
# a real market.
# Used by media-production when scene argues "DCA removes timing risk",
# "constant monthly buying is mathematically advantageous", or "just DCA the index"
# (objection myth d2-just-dca-the-index).

