# OPPORTUNITY-COST chart — RM100,000 over 18 years: a 2% savings account vs an ILLUSTRATIVE
# ~6% long-run balanced invested return. The honest general-audience argument: a 2% savings
# account barely loses to general CPI, but it FORGOES a lot of potential growth versus
# investing. Frame is opportunity cost (forgone growth), NOT inflation erosion / "a loss".
#
# COMPLIANCE NOTE (do not strip): the 6% is an ILLUSTRATIVE long-run balanced-portfolio
# assumption — NOT a promised, guaranteed, assured, or projected return, and NOT tied to any
# named fund or product. The caption carries the mandatory balanced-risk note (investing
# carries market risk that a savings account does not; illustrative figures do not predict
# future results). Cross-checked against corpus/compliance/banned-phrases.yaml — no banned
# phrasing; no "guaranteed/safe/beats EPF/best fund" framing; does not state or imply
# investing is certain to outperform saving.
#
# FORMULA chart — figures derived from the formulas in source_citation, no separate dataset.
# Used by media-production when a scene argues "saving doesn't lose much to inflation, but it
# costs you the growth you give up" / "the real price of playing it safe is forgone compounding".

