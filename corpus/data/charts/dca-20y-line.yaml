# Dollar-cost averaging — market price vs YOUR average cost per unit, over 20 years
# Source: ILLUSTRATIVE market path. A single investor contributes a fixed RM200/month
# (RM2,400/year) for 21 years on a volatile-but-rising market. Two series are derived
# from the same price path:
#   • "Market price"  = price per unit each year (the volatile line).
#   • "Your avg cost" = total invested ÷ cumulative units owned (the smoother line).
# Because the fixed ringgit buys MORE units when the price is low, every crash drags the
# average-cost line DOWN (or flattens its climb) — the year-3 and year-9 dips are visible
# averaging-down moments. End state: avg cost ≈ RM1.86 while the market sits at RM4.50, so
# the units are worth ~2.4× what they cost. This is the mechanical point of DCA.
# Units math (RM2,400/yr ÷ price): cum units 27,026 on RM50,400 invested → 50400/27026 = 1.865.
# Used by media-production when a scene argues "keep buying through the dips", "crashes are
# when you buy cheap", "averaging down", or "time in the market beats timing the market."

