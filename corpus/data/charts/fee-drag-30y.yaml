# Fee drag over 30 years — what a "small" annual fee quietly removes
# Source: ILLUSTRATIVE compound-cost math. RM300/month contributed monthly for 30 years
# on a 6% gross annual return. Each bar is the RM lost to fees over the full 30 years at
# that annual fee level (gross FV minus net-of-fee FV). Figures are the FV of a monthly
# annuity at the gross rate minus the same annuity at the net (gross − fee) rate, rounded.
# A horizontal/ranked bar suits this: few categories, long-ish labels, one dramatic spread.
# Used by media-production when a scene argues "fees compound against you", "a 1% fee is
# not small over 30 years", or "check the expense ratio before you check the brochure."

