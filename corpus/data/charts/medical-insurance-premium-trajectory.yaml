# Medical-INSURANCE PREMIUM inflation — what an illustrative RM250/month premium does over 10 years
# under the BNM <=10%/yr repricing cap. This is PREMIUM inflation (what a parent PAYS),
# DISTINCT from medical-COST inflation (the price of treatment).
# Upstream dataset-of-record: corpus/data/_pending/datasets/medical-insurance-premium-repricing.json
# (BNM Dec 2024 interim measures + Nov 2024 40-70% repricing context = verified; RM250 glide = derived).
# NO year-1 spike: the +40-70% insurers SOUGHT is documented context only — BNM forbade the one-off
# pass-through, so it is never plotted. The plotted series is the clean 10%/yr glide.
# Used by content when a scene argues "your medical card premium isn't fixed — it reprices",
# "even capped at 10%/yr, your premium doubles in ~7 years", or any protection-gap / health-cover
# hook for Malaysian parents budgeting for family medical cover.

