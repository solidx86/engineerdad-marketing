# Medical-cost inflation vs general inflation — the compounding gap on one RM10,000 unit
# of medical treatment over 20 years. Hero = the medical line at an illustrative 12%/yr
# (a CHOSEN rate that sits WITHIN the ~9-15% range Malaysia has recorded, NOT an official
# statistic and NOT a computed average); comparison = the same unit under 2%/yr general
# inflation (DOSM CPI).
# Dataset-of-record: corpus/data/datasets/medical-inflation-vs-general.json (BNM/Aon/Mercer
# rate series [verified] + the derived compounding model [illustrative]). The 12% line and
# RM10,000 base are derived/illustrative, not measured; the 2024 BNM actual was higher at
# 15%; medical inflation runs ~6-8x general CPI.
# Used by media-production when a scene argues "medical costs are quietly outrunning your
# salary", "why a medical/health buffer can't sit in cash", "the silent gap in a family's
# plan", or any Money Psychology hook that opens on healthcare cost shock.

id: medical-inflation-vs-general
